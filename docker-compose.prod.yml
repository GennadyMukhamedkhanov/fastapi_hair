name: fastapi-hair-prod

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    volumes:
      - media_data:/home/fast/media
    env_file:
      - ./app/.env.prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://hair_user:198616Gm@db:5432/hair_db
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=hair_user
      - POSTGRES_PASSWORD=198616Gm
      - POSTGRES_DB=hair_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hair_user -d hair_db"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./app/common/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/var/www/media
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  media_data: