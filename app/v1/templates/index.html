<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    <link rel="stylesheet" href="/v1/static/css/index.css">
</head>
<body>
<div class="container">
    <h1>💇‍♀️ CRM Hair</h1>
    <p class="subtitle">Управление складом</p>

    <div class="button-group">
        <button class="btn btn-primary" onclick="window.location.href='/v1/hairs/'">
            📋 Список волос
        </button>

        <button class="btn btn-success" onclick="window.location.href='/v1/hairs/create'">
            ➕ Создать продукт
        </button>

        <button class="btn btn-secondary" onclick="showDemoMessage('сделать заказ')">
            🛒 Заказы
        </button>

        <button class="btn btn-danger" onclick="showDemoMessage('статистика')">
            📊 Статистика
        </button>
    </div>

    <div id="demoMessage" class="demo-message">
        ⚡ Заглушка: <span id="actionName"></span> — здесь будет подключён API
    </div>

    <div class="footer">
        🔗 API Docs:
        <a href="/v1/docs" target="_blank">http://127.0.0.1:8000/v1/docs</a>
    </div>
</div>

<script>
        function showDemoMessage(action) {
            const messageBox = document.getElementById('demoMessage');
            const actionSpan = document.getElementById('actionName');

            actionSpan.textContent = action;
            messageBox.classList.add('show');

            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 3000);

            console.log(`🔘 Нажата кнопка: ${action}`);
        }

        setTimeout(() => {
            showDemoMessage('демонстрация интерфейса');
        }, 500);

</script>
</body>
</html>
