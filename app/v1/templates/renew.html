{% extends "base.html" %}
{% block title %}Продление{% endblock %}

{% block content %}
<section class="card">
  <h1>Продление доступа</h1>
  <p class="muted">Раз в 30 дней нужно заново подтвердить email.</p>

  <form method="post" action="/v1/auth_pages/renew/send-code" class="form">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" value="{{ email }}" required />
    <button class="btn btn-secondary" type="submit">Получить новый код</button>
  </form>

  {% if code_sent %}
  <form method="post" action="/v1/auth_pages/renew/confirm" class="form top-gap">
    <input type="hidden" name="email" value="{{ email }}" />
    <label for="code">Код</label>
    <input id="code" name="code" type="text" maxlength="6" inputmode="numeric" required />
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <button class="btn btn-primary" type="submit">Обновить токен</button>
  </form>
  {% endif %}
</section>
{% endblock %}
