<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заказы — CRM Hair</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Собственный CSS -->
  <link rel="stylesheet" href="/v1/static/css/orders.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      animation: fadeIn 0.8s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="orders-body">
  <!-- Фоновые декоративные элементы -->
  <div class="bg-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <div class="container">
    <div class="header-text">
      <div class="badge-icon">
        <i class="fas fa-store"></i>
      </div>
      <h1>🛒 Управление заказами</h1>
      <p class="subtitle">Создавайте и отслеживайте заказы в одном месте</p>
    </div>

    <div class="button-group">
      <a href="/v1/orders/create" class="btn btn-lg btn-card btn-card-success">
        <i class="fas fa-plus-circle btn-icon"></i>
        <span>Создать заказ</span>
      </a>
      <a href="/v1/orders/list" class="btn btn-lg btn-card btn-card-primary">
        <i class="fas fa-list-ul btn-icon"></i>
        <span>Посмотреть заказы</span>
      </a>
    </div>

    <button class="back-btn" onclick="location.href='/v1/index/'">
      <i class="fas fa-arrow-left"></i>
      <span>Назад к главной</span>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
