services:
  redis:
    image: redis:7-alpine
    container_name: hair_shop_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hair_network

  web:
    build: .
    volumes:
      - ./app:/home/fast/app
      - ./alembic.ini:/home/fast/alembic.ini
      - media_data:/home/fast/media
    env_file:
      - ./app/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://hair_user:198616Gm@db:5432/hair_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hair_network

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hair_user
      POSTGRES_PASSWORD: 198616Gm
      POSTGRES_DB: hair_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hair_user -d hair_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hair_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./app/common/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/var/www/media
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - hair_network

  # Опционально: Redis Commander для визуального управления (только для разработки)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hair_shop_redis_commander_dev
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - hair_network

volumes:
  postgres_data:
  media_data:
  redis_data:

networks:
  hair_network:
    driver: bridge